<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML TABLE</title>
</head>
<body>
    <h3>Learning HTML TABLE</h3>

    <table border="2" cellpadding="10" cellspacing="10">
        <thead>
            <tr>
                <th>Day/time</th>
                <th>10-11</th>
                <th>11-12</th>
                <th>12-01</th>
                <th>01-02</th>
                <th>02-03</th>
            </tr>
        </thead>
        <tbody align="center">
            <tr>
                <td>Mon</td>
                <td>C++</td>
                <td>DSA</td>
                <td rowspan="3">BREAK</td>
                <td>JAVA</td>
                <td>Eng</td>
            </tr>
            <tr>
                <td>Tue</td>
                <td colspan="2">WEB</td>
                <td>SST</td>
                <td>SCI</td>
            </tr>
            <tr>
                <td>WED</td>
                <td>Python</td>
                <td>WEB</td>
                <td colspan="2">JAVA</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
